name: farm_direct
description: A modern marketplace connecting farmers and buyers directly using Flutter and Supabase.
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Supabase Integration
  supabase_flutter: ^2.8.0

  # State Management & Dependency Injection
  provider: ^6.1.2

  # Utilities & Offline Caching
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  cached_network_image: ^3.4.1

  # Image Uploading (Android, iOS & PWA/Web)
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # Enable generic assets if needed in future, otherwise use web assets for PWA
  assets:
    - assets/
