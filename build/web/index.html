<!DOCTYPE html>
<html>
<head>
  <base href="/New_App_St_Veb/build/web/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Direct marketplace connecting Farmers and Buyers without middlemen.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Farm Direct">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Farm Direct</title>
  <link rel="manifest" href="manifest.json">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2E7D32">

  <style>
    body {
      background-color: #F1F8E9;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: sans-serif;
    }
    .loading-container {
      text-align: center;
    }
    .spinner {
      border: 4px solid rgba(46, 125, 50, 0.1);
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border-left-color: #2E7D32;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .loading-text {
      color: #2E7D32;
      font-weight: bold;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>
  <div class="loading-container">
    <div class="spinner"></div>
    <div class="loading-text">Connecting Farmers & Buyers Directly...</div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
